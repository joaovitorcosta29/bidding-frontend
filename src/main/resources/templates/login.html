<html>
    <head xmlns: th="http://www.thymleaf.org">
        <title>Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <form     th:action="@{/logar}" th:object="${credenciais}" method="post">
            <label>E-mail: </label>
            <input type="email" th:field="*{email}"/>
            <br/>
            <label>Senha: </label>
            <input type="password" th:field="*{senha}" />
            <br/>
            <button type="submit">Logar</button>
        </form>
    </body>
</html>
