<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <title>Registrar</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body> 
        <div class="p-1 bg-primary text-white"></div>

        <div class="d-flex justify-content-center align-items-center" style="min-height: 90vh;">

            <div class="card shadow-sm" style="width: 400px; border-radius: 10px; overflow: hidden;">

                <div class="card-header bg-primary text-white py-3 text-center">
                    <h4 class="mb-0 fw-bold">Criar Conta</h4>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{/registrar}" th:object="${user}" method="post">

                        <div class="form-floating mb-3 text-start">
                            <input type="text" class="form-control" id="floatingNome" placeholder="" th:field="*{nome}">
                            <label for="floatingNome">Nome</label>
                        </div>

                        <div class="form-floating mb-3 text-start">
                            <input type="email" class="form-control" id="floatingEmail" placeholder="" th:field="*{email}">
                            <label for="floatingEmail">E-mail</label>
                        </div>

                        <div class="form-floating mb-4 text-start">
                            <input type="password" class="form-control" id="floatingSenha" placeholder="" th:field="*{senha}">
                            <label for="floatingSenha">Senha</label>
                        </div>
                        <div class="form-floating mb-4 text-start">
                            <input type="password" class="form-control" id="floatingSenha2" placeholder="">
                            <label for="floatingSenha">Confirmar Senha</label>
                        </div>

                        <div class="d-grid gap-2 mb-3">
                            <button type="submit" class="btn btn-primary py-2 fw-bold">Cadastrar</button>
                        </div>

                        <div class="text-center small text-muted">
                            Já tem uma conta? <a class="text-primary fw-bold text-decoration-none" href="./login">Entrar</a>
                        </div>
                    </form>
                </div>

            </div>

        </div>
    </body>
</html>
