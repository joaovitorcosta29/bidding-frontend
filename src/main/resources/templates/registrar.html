<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Registrar</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h2>Registrar</h2>
        <form 
            th:action="@{/registrar}"
            th:object="${user}" method="post"
        >
            <label>Nome: </label>
            <input type="text" th:field="*{nome}" placeholder="lambarildo"/>
            <br/><br/>
            
            <label>Email: </label>
            <input type="email" th:field="*{email}" placeholder="lambarildo.peixe@hotmail.com" />
            <br/><br/>
            
            <label>Senha: </label>
            <input type="password" th:field="*{senha}" />
            <br/><br/>
            
            <button type="submit">Cadastrar</button>
            
        </form>
    </body>
</html>
